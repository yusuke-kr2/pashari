<!DOCTYPE html>
<html lang="ja">
  <head>
    <title>エラーが発生しました - Pashari</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; box-sizing: border-box; }
      body {
        background: #FAF7F2;
        color: #333;
        font-family: "Noto Sans JP", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        text-align: center;
        padding: 20px;
      }
      .error-page .error-code {
        font-size: 4rem;
        font-weight: 700;
        color: #E0DBD3;
        line-height: 1;
        margin-bottom: 12px;
      }
      .error-page .error-message {
        font-size: 1rem;
        font-weight: 700;
        margin-bottom: 8px;
      }
      .error-page .error-description {
        font-size: 0.85rem;
        color: #999;
        margin-bottom: 24px;
      }
      .error-page a {
        display: inline-block;
        background: #C4704B;
        color: #fff;
        text-decoration: none;
        border-radius: 24px;
        padding: 10px 24px;
        font-size: 0.9rem;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="error-page">
      <div class="error-code">500</div>
      <p class="error-message">エラーが発生しました</p>
      <p class="error-description">しばらくしてからもう一度お試しください。</p>
      <a href="/">ホームに戻る</a>
    </div>
  </body>
</html>
